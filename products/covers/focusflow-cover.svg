<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="ffbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#f5f3ff"/>
    </linearGradient>
    <linearGradient id="ffaccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="ffglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#ffbg)"/>

  <!-- Subtle circles -->
  <circle cx="150" cy="150" r="120" fill="#e9d5ff" opacity="0.4"/>
  <circle cx="680" cy="680" r="160" fill="#ddd6fe" opacity="0.3"/>
  <circle cx="650" cy="100" r="80" fill="#fce7f3" opacity="0.3"/>

  <!-- Top accent -->
  <rect x="200" y="60" width="400" height="2" rx="1" fill="#c4b5fd"/>

  <!-- Brain icon -->
  <g transform="translate(400,160)" filter="url(#ffglow)">
    <circle cx="0" cy="0" r="48" fill="white" stroke="#c4b5fd" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" font-size="44" font-family="sans-serif">🧠</text>
  </g>

  <!-- Tag -->
  <text x="400" y="250" text-anchor="middle" font-size="14" fill="#a78bfa" font-family="sans-serif" letter-spacing="5" font-weight="600">MINIMALIST 3-DATABASE SYSTEM</text>

  <!-- Title -->
  <text x="400" y="350" text-anchor="middle" font-size="48" fill="#6d28d9" font-family="Georgia,serif" font-weight="bold">
    <tspan x="400" dy="0">FocusFlow</tspan>
  </text>

  <!-- Divider -->
  <rect x="300" y="385" width="200" height="1.5" fill="#c4b5fd"/>

  <!-- Subtitle -->
  <text x="400" y="440" text-anchor="middle" font-size="21" fill="#8b5cf6" font-family="Georgia,serif" font-style="italic">
    The ADHD-Friendly
  </text>
  <text x="400" y="470" text-anchor="middle" font-size="21" fill="#8b5cf6" font-family="Georgia,serif" font-style="italic">
    Notion Life OS
  </text>

  <!-- Three pillars -->
  <g transform="translate(160,550)" font-family="sans-serif" font-size="18" fill="#6d28d9" font-weight="600">
    <text x="280" y="0" text-anchor="middle">🧠</text>
    <text x="280" y="30" text-anchor="middle" font-size="14" fill="#7c3aed">Brain Dump</text>
    <text x="400" y="0" text-anchor="middle">✅</text>
    <text x="400" y="30" text-anchor="middle" font-size="14" fill="#7c3aed">Focus 3</text>
    <text x="520" y="0" text-anchor="middle">🎮</text>
    <text x="520" y="30" text-anchor="middle" font-size="14" fill="#7c3aed">Dopamine</text>
  </g>

  <!-- Bottom accent -->
  <rect x="200" y="650" width="400" height="1.5" fill="#c4b5fd"/>

  <text x="400" y="700" text-anchor="middle" font-size="14" fill="#a78bfa" font-family="sans-serif" letter-spacing="3">INSTANT DOWNLOAD</text>
  <text x="400" y="730" text-anchor="middle" font-size="12" fill="#c4b5fd" font-family="sans-serif">NOTION TEMPLATE • PDF GUIDE</text>

  <circle cx="370" cy="765" r="2" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="385" cy="765" r="2" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="400" cy="765" r="2" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="415" cy="765" r="2" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="430" cy="765" r="2" fill="#c4b5fd" opacity="0.4"/>
</svg>
